name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wp_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none

      - name: Install Dependencies
        run: composer install --prefer-dist --no-interaction

      - name: PHPCS (WordPress Coding Standards)
        run: vendor/bin/phpcs --standard=WordPress src/ entrydashboard.php

      - name: PHPUnit — Unit
        run: vendor/bin/phpunit -c phpunit.unit.xml.dist

      - name: PHPUnit — Integration
        run: vendor/bin/phpunit -c phpunit.integration.xml.dist

  build-admin-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build