name: Generate Plugin ZIP & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify version consistency
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Plugin header ==="
          head -30 entrydashboard.php

          echo "=== Version lines ==="
          grep -n "Version" entrydashboard.php || true
          grep -n "Stable tag" readme.txt || true

          HEADER_VER=$(awk '
            BEGIN { IGNORECASE=1 }
            /^[ \t\/*]*Version:/ {
              sub(/^[ \t\/*]*Version:[ \t]*/, "")
              gsub(/\r/, "")
              print
              exit
            }
          ' entrydashboard.php)

          STABLE_TAG=$(awk -F': *' '/^Stable tag:/ {gsub(/\r/, ""); print $2; exit}' readme.txt)
          TAG_VER="${GITHUB_REF_NAME#v}"

          echo "Header version : [$HEADER_VER]"
          echo "Stable tag     : [$STABLE_TAG]"
          echo "Git tag        : [$TAG_VER]"

          test -n "$HEADER_VER" || { echo "::error::Could not read Version from entrydashboard.php"; exit 1; }

          if [ "$HEADER_VER" != "$STABLE_TAG" ] || [ "$HEADER_VER" != "$TAG_VER" ]; then
            echo "::error::Version mismatch — header=$HEADER_VER stable_tag=$STABLE_TAG git_tag=$TAG_VER"
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'

      - name: Install PHP Dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Prepare Bundle
        run: |
          mkdir -p entrydashboard

          cp -r src entrydashboard/
          cp -r vendor entrydashboard/
          cp -r languages entrydashboard/
          cp -r assets entrydashboard/

          cp entrydashboard.php entrydashboard/
          cp readme.txt entrydashboard/
          cp composer.json entrydashboard/

          if [ -f composer.lock ]; then
            cp composer.lock entrydashboard/
          fi

          find entrydashboard -name "*.map" -delete

      - name: Create ZIP
        run: zip -r entries-manager.zip entrydashboard

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: entries-manager.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to WordPress.org SVN
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: entries-manager
          BUILD_DIR: entrydashboard